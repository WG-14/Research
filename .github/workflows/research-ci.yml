      RESEARCH_REPORT_ROOT: /tmp/market-research-operations/reports
      RESEARCH_CACHE_ROOT: /tmp/market-research-operations/cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.11.2"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync the complete workspace from the root lock
        run: |
          uv lock --check
          uv sync --frozen --all-packages --all-groups
      - name: Build exact release inputs for the blank-restore rehearsal
        run: |
          set -euo pipefail
          scripts/platform build
          uv run --no-sync python tools/release_manifest.py \
            --release-id "ci-${GITHUB_SHA}" \
            --artifacts-dir dist/platform \
            --output "$RESEARCH_OPS_CI_RELEASE_MANIFEST"
      - name: Apply Web migrations required by Operations foreign keys
        run: uv run --no-sync python apps/internal_web/manage.py migrate --noinput --settings=market_research_web.settings_test
      - name: Run the complete Operations suite with zero skips
        run: |
          set -euo pipefail
          uv run --no-sync pytest -q \
            -c services/research_operations/pyproject.toml \
            services/research_operations/tests \
            --junitxml=/tmp/operations-tests.xml
          uv run --no-sync python - <<'PY'
          from xml.etree import ElementTree

          root = ElementTree.parse("/tmp/operations-tests.xml").getroot()
          cases = list(root.iter("testcase"))
          skipped = list(root.iter("skipped"))
          assert cases, "Operations test report contains no test cases"
          assert not skipped, f"Operations tests skipped unexpectedly: {len(skipped)}"
          PY
