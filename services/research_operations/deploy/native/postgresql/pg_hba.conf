# Complete pg_hba policy for the official single-host native profile. The
# bootstrap installs this as /etc/research-ops/postgresql/pg_hba.conf.
local   all       postgres                                      peer
local   all       all                                           reject
hostssl research  research_owner       127.0.0.1/32             scram-sha-256
hostssl research  research_runtime     127.0.0.1/32             scram-sha-256
hostssl research  research_diagnostics 127.0.0.1/32             scram-sha-256
hostssl research  research_validator   127.0.0.1/32             scram-sha-256
hostssl research  research_backup      127.0.0.1/32             scram-sha-256
hostssl research  research_owner       ::1/128                  scram-sha-256
hostssl research  research_runtime     ::1/128                  scram-sha-256
hostssl research  research_diagnostics ::1/128                  scram-sha-256
hostssl research  research_validator   ::1/128                  scram-sha-256
hostssl research  research_backup      ::1/128                  scram-sha-256
host    all       all                  127.0.0.1/32              reject
host    all       all                  ::1/128                   reject
host    all       all                  0.0.0.0/0                 reject
host    all       all                  ::/0                      reject
