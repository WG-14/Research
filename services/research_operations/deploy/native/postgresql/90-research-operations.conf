# PostgreSQL 16 drop-in for the official single-host native profile.
# The application connects to its certificate DNS name, which must resolve to
# loopback on this host. Never widen this listener without a separately reviewed
# network/HBA qualification.
listen_addresses = '127.0.0.1,::1'
port = 5432
password_encryption = 'scram-sha-256'
ssl = on
ssl_min_protocol_version = 'TLSv1.2'
ssl_cert_file = '/etc/research-ops/pki/postgres.crt'
ssl_key_file = '/etc/research-ops/pki/postgres.key'
ssl_ca_file = '/etc/research-ops/pki/database-ca.crt'
hba_file = '/etc/research-ops/postgresql/pg_hba.conf'
timezone = 'UTC'
log_timezone = 'UTC'
log_connections = on
log_disconnections = on
log_line_prefix = '{"timestamp":"%m","severity":"%e","service_role":"postgresql","event_code":"postgres_server","database":"%d","application":"%a"} '
statement_timeout = '5min'
lock_timeout = '60s'
idle_in_transaction_session_timeout = '5min'
