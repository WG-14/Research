listen_addresses = '*'
port = 5432
password_encryption = 'scram-sha-256'
ssl = on
ssl_min_protocol_version = 'TLSv1.2'
ssl_cert_file = '/var/lib/postgresql/tls/server.crt'
ssl_key_file = '/var/lib/postgresql/tls/server.key'
ssl_ca_file = '/var/lib/postgresql/tls/ca.crt'
timezone = 'UTC'
log_timezone = 'UTC'
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_line_prefix = '{"timestamp":"%m","severity":"%e","service_role":"postgresql","event_code":"postgres_server","database":"%d","application":"%a"} '
shared_buffers = '256MB'
max_connections = 100
statement_timeout = '5min'
lock_timeout = '60s'
idle_in_transaction_session_timeout = '5min'
